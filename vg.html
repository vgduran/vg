:root{
--bg: #f5f7fb;
--card: #ffffff;
--text: #1f2937;
--muted: #6b7280;
--primary: #0b4f8a;

--radius: 12px;
}
*{box-sizing:border-box}
html, body { margin:0; padding:0; font-family: Inter, system-ui, -apple-system, Arial, sans-serif; color:var(--text); background:var(--bg);}
a { color: var(--primary); text-decoration: none; }
header { position: sticky; top:0; z-index: 1000; background: white; border-bottom: 1px solid #eee; }
.nav { max-width: 1100px; margin:0 auto; display:flex; align-items:center; justify-content: space-between; padding: 14px 16px; }

.brand .logo { font-size: 1.25rem; }
nav a { margin: 0 10px; font-size: 0.95rem; color: #374151; }
.hero {
background: linear-gradient(135deg, #0b4f8a 0%, #1b7bd2 60%, #1cc9c9 100%);
color: white;
padding: 72px 20px;
text-align: left;
}
.container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.card { background: white; border-radius: var(--radius); padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
h1 { margin:0 0 6px; font-size: 2rem; }
h2 { font-size: 1.5rem; margin: 0 0 12px; }
p { color: #374151; line-height: 1.6; }
.cta { display:inline-block; padding: 12px 20px; border-radius: 999px; background: white; color: var(--primary); font-weight: 700; border: 2px solid white; text-decoration: none; transition: transform .2s ease; }
.cta:hover { transform: translateY(-1px); background: #f0f4f8; border-color: #fff; }
footer { text-align:center; color: var(--muted); padding: 28px 0; font-size: 0.9rem; }
